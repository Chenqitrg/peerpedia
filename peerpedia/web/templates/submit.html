<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} — 知著网</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <header>
        <h1>📚 知著网</h1>
        <nav>
            <a href="/">首页</a>
            <a href="/review">审稿队列</a>
            {% if viewer %}
            <a href="/user/{{ viewer }}">👤 我的主页</a>
            {% endif %}
            <span style="margin-left: auto; font-size: 0.85em;">
                <select id="viewer-picker" onchange="setViewer(this.value)"
                        style="padding: 2px 4px; border: 1px solid var(--border); border-radius: 4px;">
                    <option value="">👽 游客</option>
                    {% for u in all_users %}
                    <option value="{{ u[0] }}" {% if viewer == u[0] %}selected{% endif %}>{{ u[1] }}</option>
                    {% endfor %}
                </select>
            </span>
        </nav>
    </header>
    <script>
    function setViewer(uid) {
        if (uid) {
            document.cookie = "viewer=" + encodeURIComponent(uid) + ";path=/;max-age=86400;SameSite=Lax";
        } else {
            document.cookie = "viewer=;path=/;max-age=0;SameSite=Lax";
        }
        location.reload();
    }
    </script>

    <main>
        <h2>提交文章</h2>
        <form action="/api/v1/articles" method="post" enctype="multipart/form-data">
            <label>标题: <input type="text" name="title" required></label>
            <label>格式:
                <select name="format">
                    <option value="typst">Typst</option>
                    <option value="markdown">Markdown + KaTeX</option>
                </select>
            </label>
            <label>摘要: <textarea name="abstract" rows="4"></textarea></label>
            <label>分类: <input type="text" name="categories" placeholder="物理, 数学"></label>
            <label>关键词: <input type="text" name="keywords"></label>
            <label>语言:
                <select name="language">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="bilingual">双语</option>
                </select>
            </label>
            <label>文件: <input type="file" name="article_file" accept=".typ,.md"></label>
            <button type="submit">提交审核</button>
        </form>
    </main>
</body>
</html>
